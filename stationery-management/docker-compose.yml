version: "3.8" #defines the version of the Docker Compose file format we are using.

#Now, list of services will begin, we will define all 8 containers, their configurations, networks and dependencies.
services:
  # 1. Database Service (hosting 3 separate isolated databases)
  stationery-mysql:
    image: mysql:8.0 #Download the official, pre-built MySQL version 8.0 image directly from Docker Hub
    container_name: stationery-mysql #names the running container, can easily be spotted on Docker desktop

    #Maps the HostPort:ContainerPort. MySQL DB inside container runs on standard port 3306,
    #we map it to 3307(on host computer). Incase laptop has a local SQL db, mapping prevents port collision.
    ports:
      - "3307:3306"
    #sets an environment variable inside container. This configures the master password.
    environment:
      MYSQL_ROOT_PASSWORD: ashuvishu
    #Volume Mapping. extra spaces, we use in docker.
    volumes:
      - ./mysql:/docker-entrypoint-initdb.d

    #connects this container to a virtual private network bridge called stationery-management to allow ms to communicate with db container
    networks:
      - stationery-network

      #defines health checks. Docker runs a command yysqladminping every 10 seconds, after db replies its ready docker marks it "healthy"
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-pashuvishu",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Config Server
  config-server:
    build: ./config-server #location of docker file
    container_name: config-server
    ports:
      - "8888:8888"
    networks:
      - stationery-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Eureka Discovery Server
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - stationery-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. API Gateway
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8085:8085"
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - stationery-network

  # 5. Authentication Service
  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    depends_on:
      stationery-mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
      - SPRING_DATASOURCE_URL=jdbc:mysql://stationery-mysql:3306/auth_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - stationery-network

  # 6. Inventory Service
  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    ports:
      - "8082:8082"
    depends_on:
      stationery-mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
      - SPRING_DATASOURCE_URL=jdbc:mysql://stationery-mysql:3306/inventory_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - stationery-network

  # 7. Request Service
  request-service:
    build: ./request-service
    container_name: request-service
    ports:
      - "8083:8083"
    depends_on:
      stationery-mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
      - SPRING_DATASOURCE_URL=jdbc:mysql://stationery-mysql:3306/request_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - stationery-network

  # 8. React Frontend UI
  frontend:
    build: ./frontend
    container_name: stationery-frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - stationery-network

networks:
  stationery-network:
    driver: bridge #acts as a bridge between two ms
