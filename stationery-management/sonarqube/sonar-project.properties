# Project Metadata
sonar.projectKey=stationery-management
sonar.projectName=Stationery Management System
sonar.projectVersion=1.0.0

# Base Sources
sonar.sources=.
sonar.exclusions=**/node_modules/**,**/target/**,**/.idea/**,**/.git/**,frontend/build/**,**/dist/**,mysql/**

# Encoding
sonar.sourceEncoding=UTF-8

# Java settings
sonar.java.binaries=**/target/classes

# Modules definition
sonar.modules=config-server,eureka-server,api-gateway,auth-service,inventory-service,request-service,frontend

# Module Configuration - Config Server
config-server.sonar.projectName=Config Server
config-server.sonar.sources=src/main
config-server.sonar.java.binaries=target/classes

# Module Configuration - Eureka Server
eureka-server.sonar.projectName=Eureka Server
eureka-server.sonar.sources=src/main
eureka-server.sonar.java.binaries=target/classes

# Module Configuration - API Gateway
api-gateway.sonar.projectName=API Gateway
api-gateway.sonar.sources=src/main
api-gateway.sonar.java.binaries=target/classes

# Module Configuration - Auth Service
auth-service.sonar.projectName=Auth Service
auth-service.sonar.sources=src/main
auth-service.sonar.java.binaries=target/classes

# Module Configuration - Inventory Service
inventory-service.sonar.projectName=Inventory Service
inventory-service.sonar.sources=src/main
inventory-service.sonar.java.binaries=target/classes

# Module Configuration - Request Service
request-service.sonar.projectName=Request Service
request-service.sonar.sources=src/main
request-service.sonar.java.binaries=target/classes

# Module Configuration - Frontend
frontend.sonar.projectName=Stationery Frontend
frontend.sonar.sources=src
frontend.sonar.exclusions=**/node_modules/**,build/**