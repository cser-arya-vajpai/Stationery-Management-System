server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false #should not register itself
    fetch-registry: false #Do not download registry from another Eureka Server.
    service-url:
      defaultZone: http://localhost:8761/eureka/
  server:
    wait-time-in-ms-when-sync-empty: 0 #How long Eureka should wait before it starts working fully.

management:
  endpoints:
    web:
      exposure:
        include: health, info
